<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Grammar Trainer — Abitur Revision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3;
  --bg-card: #ffffff;
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --accent: #2563eb;
  --accent-light: #dbeafe;
  --correct: #16a34a;
  --correct-light: #dcfce7;
  --wrong: #dc2626;
  --wrong-light: #fee2e2;
  --border: #e5e5e5;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* --- Header --- */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header h1 span { color: var(--accent); }
.header-stats {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* --- Layout --- */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* --- Topic Grid (Home) --- */
.home-intro { margin-bottom: 2rem; }
.home-intro h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.03em; }
.home-intro p { color: var(--text-muted); font-size: 0.95rem; }
.topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem; }
.topic-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.25rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative;
}
.topic-card:hover, .topic-card:focus { border-color: var(--accent); box-shadow: var(--shadow); outline: none; }
.topic-card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; }
.topic-card .topic-count { font-size: 0.8rem; color: var(--text-muted); }
.topic-card .topic-progress { margin-top: 0.75rem; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.topic-card .topic-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.topic-group-label {
  grid-column: 1 / -1; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted); padding: 1rem 0 0.25rem; border-top: 1px solid var(--border);
}
.topic-group-label:first-child { border-top: none; padding-top: 0; }

/* --- Exercise View --- */
.exercise-header { margin-bottom: 1.5rem; }
.back-btn {
  display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--text-muted);
  text-decoration: none; cursor: pointer; border: none; background: none; font-family: var(--font);
  margin-bottom: 1rem; padding: 0;
}
.back-btn:hover { color: var(--text); }
.exercise-header h2 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
.exercise-header .exercise-sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }

.progress-bar-container { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* --- Exercise Card --- */
.exercise-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.exercise-instruction { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 0.75rem; }
.exercise-sentence { font-size: 1.05rem; line-height: 1.8; margin-bottom: 1rem; }

/* Gap-fill */
.gap-input {
  display: inline-block; border: none; border-bottom: 2px solid var(--border); background: transparent;
  font-family: var(--mono); font-size: 0.95rem; padding: 0.15rem 0.25rem; width: auto; min-width: 100px;
  text-align: center; outline: none; transition: border-color 0.2s;
}
.gap-input:focus { border-bottom-color: var(--accent); }
.gap-input.correct { border-bottom-color: var(--correct); color: var(--correct); background: var(--correct-light); }
.gap-input.wrong { border-bottom-color: var(--wrong); color: var(--wrong); background: var(--wrong-light); }

/* Multiple choice */
.mc-options { display: flex; flex-direction: column; gap: 0.5rem; }
.mc-option {
  display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.15s; background: var(--bg-card);
}
.mc-option:hover, .mc-option:focus { border-color: var(--accent); background: var(--accent-light); outline: none; }
.mc-option.selected { border-color: var(--accent); background: var(--accent-light); }
.mc-option.correct-answer { border-color: var(--correct); background: var(--correct-light); }
.mc-option.wrong-answer { border-color: var(--wrong); background: var(--wrong-light); }
.mc-option .mc-letter {
  width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; flex-shrink: 0;
}
.mc-option.selected .mc-letter { border-color: var(--accent); background: var(--accent); color: white; }
.mc-option.correct-answer .mc-letter { border-color: var(--correct); background: var(--correct); color: white; }
.mc-option.wrong-answer .mc-letter { border-color: var(--wrong); background: var(--wrong); color: white; }

/* Drag & Drop */
.drag-bank { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 1rem; background: var(--bg); border-radius: 8px; margin-bottom: 1rem; min-height: 48px; }
.drag-item {
  display: inline-flex; align-items: center; padding: 0.4rem 0.75rem; background: var(--bg-card);
  border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.9rem; font-family: var(--mono);
  cursor: grab; user-select: none; transition: all 0.15s; touch-action: none;
}
.drag-item:active { cursor: grabbing; opacity: 0.7; }
.drag-item.placed { opacity: 0.4; pointer-events: none; }

.drop-zone {
  display: inline-flex; align-items: center; justify-content: center; min-width: 100px; min-height: 34px;
  border: 2px dashed var(--border); border-radius: 6px; padding: 0.2rem 0.5rem; font-family: var(--mono);
  font-size: 0.9rem; vertical-align: middle; transition: all 0.15s; cursor: pointer;
}
.drop-zone.over { border-color: var(--accent); background: var(--accent-light); }
.drop-zone.filled { border-style: solid; border-color: var(--accent); background: var(--accent-light); }
.drop-zone.correct { border-color: var(--correct); background: var(--correct-light); border-style: solid; }
.drop-zone.wrong { border-color: var(--wrong); background: var(--wrong-light); border-style: solid; }

/* Error correction */
.error-sentence { font-size: 1.05rem; line-height: 2; margin-bottom: 0.75rem; }
.error-word { display: inline-block; padding: 0.1rem 0.35rem; border-radius: 4px; cursor: pointer; transition: all 0.15s; border-bottom: 2px solid transparent; }
.error-word:hover, .error-word:focus { background: var(--accent-light); outline: none; }
.error-word.selected { background: var(--accent-light); border-bottom-color: var(--accent); }
.error-correction-input { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
.error-correction-input input { flex: 1; padding: 0.5rem 0.75rem; border: 1.5px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 0.9rem; outline: none; }
.error-correction-input input:focus { border-color: var(--accent); }
.error-word.correct-word { background: var(--correct-light); border-bottom-color: var(--correct); }
.error-word.wrong-word { background: var(--wrong-light); border-bottom-color: var(--wrong); text-decoration: line-through; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 0.6rem 1.25rem;
  border-radius: 8px; font-family: var(--font); font-size: 0.85rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover, .btn-primary:focus { background: #1d4ed8; outline: none; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover, .btn-outline:focus { border-color: var(--accent); color: var(--accent); outline: none; }
.exercise-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; flex-wrap: wrap; }

/* Feedback */
.feedback { margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; }
.feedback.correct { background: var(--correct-light); color: var(--correct); }
.feedback.wrong { background: var(--wrong-light); color: var(--wrong); }
.feedback .explanation { font-weight: 400; margin-top: 0.25rem; color: var(--text); font-size: 0.85rem; }

/* Results */
.results-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; box-shadow: var(--shadow); }
.results-card h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
.results-score { font-size: 3rem; font-weight: 700; color: var(--accent); margin: 1rem 0; }
.results-detail { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

/* Responsive & Print */
@media (max-width: 600px) {
  .container { padding: 1rem; }
  .topic-grid { grid-template-columns: 1fr; }
  .exercise-card { padding: 1.25rem; }
  .header-inner { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
}
@media print { .header, .exercise-actions, .back-btn { display: none; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><span>▸</span> English Grammar Trainer</h1>
    <div class="header-stats" id="headerStats"></div>
  </div>
</div>

<div class="container" id="app"></div>

<script src="exercises.js"></script>

<script>
// ============================================================
// APP STATE
// ============================================================
let state = {
  view: 'home', // home | topic | results
  currentTopic: null,
  currentIndex: 0,
  answers: {},
  score: 0,
  total: 0,
  progress: loadProgress(),
};

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('grammar-progress') || '{}'); }
  catch { return {}; }
}
function saveProgress() {
  try { localStorage.setItem('grammar-progress', JSON.stringify(state.progress)); }
  catch {}
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && state.view === 'topic') {
    const checkBtn = document.getElementById('checkBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    if (checkBtn && checkBtn.style.display !== 'none') {
      checkBtn.click();
    } else if (nextBtn && nextBtn.style.display !== 'none') {
      nextBtn.click();
    }
  }
});

// ============================================================
// RENDER ENGINE
// ============================================================
const app = document.getElementById('app');
const headerStats = document.getElementById('headerStats');

function render() {
  updateHeaderStats();
  if (state.view === 'home') renderHome();
  else if (state.view === 'topic') renderExercise();
  else if (state.view === 'results') renderResults();
}

function updateHeaderStats() {
  // EXERCISE_DB kommt aus der exercises.js Datei
  if (typeof EXERCISE_DB === 'undefined') {
      headerStats.textContent = "Error: Database not loaded!";
      return;
  }
  const total = Object.keys(EXERCISE_DB).reduce((sum, k) => sum + EXERCISE_DB[k].exercises.length, 0);
  const done = Object.values(state.progress).reduce((sum, p) => sum + (p.completed || 0), 0);
  headerStats.textContent = `${done} / ${total} exercises completed`;
}

// ---- HOME ----
function renderHome() {
  if (typeof EXERCISE_DB === 'undefined') {
      app.innerHTML = "<p>Error: exercises.js could not be loaded. Please make sure the file is in the same folder as this HTML file.</p>";
      return;
  }

  const groups = {};
  for (const [key, topic] of Object.entries(EXERCISE_DB)) {
    if (!groups[topic.group]) groups[topic.group] = [];
    groups[topic.group].push({ key, ...topic });
  }

  let html = `
    <div class="home-intro">
      <h2>Abitur Revision & Grammar</h2>
      <p>Choose a topic to start practising. Your progress is saved automatically.</p>
    </div>
    <div class="topic-grid">
  `;

  for (const [group, topics] of Object.entries(groups)) {
    html += `<div class="topic-group-label">${group}</div>`;
    for (const t of topics) {
      const p = state.progress[t.key] || { completed: 0 };
      const pct = Math.round((p.completed / t.exercises.length) * 100) || 0;
      html += `
        <div class="topic-card" onclick="startTopic('${t.key}')" role="button" tabindex="0">
          <h3>${t.title}</h3>
          <div class="topic-count">${t.exercises.length} exercises · ${p.completed || 0} completed</div>
          <div class="topic-progress"><div class="topic-progress-bar" style="width:${pct}%"></div></div>
        </div>
      `;
    }
  }

  html += '</div>';
  app.innerHTML = html;
}

// ---- START TOPIC ----
function startTopic(key) {
  state.view = 'topic';
  state.currentTopic = key;
  state.currentIndex = 0;
  state.answers = {};
  state.score = 0;
  state.total = EXERCISE_DB[key].exercises.length;
  render();
  window.scrollTo(0, 0);
}

// ---- RENDER EXERCISE ----
function renderExercise() {
  const topic = EXERCISE_DB[state.currentTopic];
  if (state.currentIndex >= topic.exercises.length) {
    state.view = 'results';
    render();
    return;
  }

  const ex = topic.exercises[state.currentIndex];
  const pct = Math.round((state.currentIndex / topic.exercises.length) * 100);

  let html = `
    <div class="exercise-header">
      <button class="back-btn" onclick="goHome()">← Back to topics</button>
      <h2>${topic.title}</h2>
      <div class="exercise-sub">Exercise ${state.currentIndex + 1} of ${topic.exercises.length}</div>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
  `;

  html += '<div class="exercise-card">';
  html += `<div class="exercise-instruction">${ex.instruction}</div>`;

  if (ex.type === 'gap') html += renderGap(ex);
  else if (ex.type === 'mc') html += renderMC(ex);
  else if (ex.type === 'drag') html += renderDrag(ex);
  else if (ex.type === 'error') html += renderError(ex);

  html += `<div id="feedback"></div>`;
  html += `<div class="exercise-actions">
    <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">Check (Enter)</button>
    <button class="btn btn-outline" id="nextBtn" onclick="nextExercise()" style="display:none">Next → (Enter)</button>
  </div>`;
  html += '</div>';

  app.innerHTML = html;

  if (ex.type === 'drag') initDragDrop();
  
  // Auto-Fokus
  const firstGap = document.querySelector('.gap-input');
  if(firstGap) firstGap.focus();
}

// ---- COMPONENT RENDERING ----
function renderGap(ex) {
  const parts = ex.sentence.split('___');
  let html = '<div class="exercise-sentence">';
  for (let i = 0; i < parts.length; i++) {
    html += parts[i];
    if (i < parts.length - 1) {
      html += `<input type="text" class="gap-input" id="gap-${i}" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Fill in the blank">`;
    }
  }
  html += '</div>';
  return html;
}

function renderMC(ex) {
  let html = ex.sentence ? `<div class="exercise-sentence">${ex.sentence}</div>` : '';
  html += '<div class="mc-options" role="radiogroup">';
  const letters = ['A', 'B', 'C', 'D', 'E'];
  ex.options.forEach((opt, i) => {
    html += `<div class="mc-option" id="mc-${i}" onclick="selectMC(${i})" role="radio" aria-checked="false" tabindex="0">
      <span class="mc-letter">${letters[i]}</span>
      <span>${opt}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

let selectedMC = null;
function selectMC(i) {
  if (document.getElementById('nextBtn').style.display !== 'none') return;
  document.querySelectorAll('.mc-option').forEach(el => {
    el.classList.remove('selected');
    el.setAttribute('aria-checked', 'false');
  });
  const selectedEl = document.getElementById('mc-' + i);
  selectedEl.classList.add('selected');
  selectedEl.setAttribute('aria-checked', 'true');
  selectedMC = i;
}

function renderDrag(ex) {
  const shuffled = [...ex.bank].sort(() => Math.random() - 0.5);
  let html = '<div class="drag-bank" id="dragBank">';
  shuffled.forEach((item, i) => {
    html += `<div class="drag-item" id="drag-${i}" draggable="true" data-value="${item}">${item}</div>`;
  });
  html += '</div>';

  html += '<div class="exercise-sentence">';
  const parts = ex.sentence.split(/(_\d+_)/);
  for (const part of parts) {
    if (/^_\d+_$/.test(part)) {
      html += `<span class="drop-zone" data-blank="${part}" onclick="clearDrop(this)"></span>`;
    } else {
      html += part;
    }
  }
  html += '</div>';
  return html;
}

function initDragDrop() {
  const items = document.querySelectorAll('.drag-item');
  const zones = document.querySelectorAll('.drop-zone');
  let dragged = null;

  items.forEach(item => {
    item.addEventListener('dragstart', e => { dragged = item; e.dataTransfer.effectAllowed = 'move'; });
    item.addEventListener('touchstart', e => { if (!item.classList.contains('placed')) dragged = item; }, {passive: true});
    item.addEventListener('click', () => {
      if (item.classList.contains('placed')) return;
      items.forEach(i => i.style.outline = '');
      item.style.outline = '2px solid var(--accent)';
      dragged = item;
    });
  });

  zones.forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('over');
      if (dragged && !zone.classList.contains('filled')) placeInZone(zone, dragged);
    });
    zone.addEventListener('click', () => {
      if (dragged && !zone.classList.contains('filled')) {
        placeInZone(zone, dragged);
        dragged = null;
      }
    });
  });
}

function placeInZone(zone, item) {
  zone.textContent = item.dataset.value;
  zone.classList.add('filled');
  zone.dataset.sourceId = item.id;
  item.classList.add('placed');
  item.style.outline = '';
}

function clearDrop(zone) {
  if (!zone.classList.contains('filled')) return;
  if (document.getElementById('nextBtn').style.display !== 'none') return;
  const srcId = zone.dataset.sourceId;
  if (srcId) {
    const src = document.getElementById(srcId);
    if (src) src.classList.remove('placed');
  }
  zone.textContent = '';
  zone.classList.remove('filled');
  zone.removeAttribute('data-source-id');
}

function renderError(ex) {
  const words = ex.sentence.split(' ');
  const isMulti = Array.isArray(ex.errorIndex);
  const neededCount = isMulti ? ex.errorIndex.length : 1;
  let html = '<div class="error-sentence">';
  words.forEach((w, i) => {
    html += `<span class="error-word" id="errw-${i}" onclick="selectError(${i})" onkeydown="if(event.key==='Enter'||event.key===' '){selectError(${i});event.preventDefault();}" tabindex="0">${w}</span> `;
  });
  html += '</div>';
  if (isMulti) {
    html += `<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem;">Select <strong>${neededCount} words</strong> that contain errors, then type corrections below.</div>`;
  }
  html += `<div id="correctionArea" style="display:none">`;
  if (isMulti) {
    ex.errorIndex.forEach((_, idx) => {
      html += `<div class="error-correction-input" style="margin-bottom:0.4rem">
        <span id="corr-label-${idx}" style="font-size:0.85rem;color:var(--text-muted);min-width:90px">Word ${idx+1} — replace with:</span>
        <input type="text" id="correctionInput-${idx}" placeholder="correction or - to delete…" autocomplete="off">
      </div>`;
    });
  } else {
    html += `<div class="error-correction-input">
      <span style="font-size:0.85rem;color:var(--text-muted)">Replace with:</span>
      <input type="text" id="correctionInput" placeholder="Type the correction…" autocomplete="off">
    </div>`;
  }
  html += `</div>`;
  return html;
}

let selectedErrorIndex = null;
let selectedErrorIndices = []; // for multi-word exercises

function selectError(i) {
  if (document.getElementById('nextBtn').style.display !== 'none') return;
  const topic = EXERCISE_DB[state.currentTopic];
  const ex = topic.exercises[state.currentIndex];
  const isMulti = Array.isArray(ex.errorIndex);
  
  if (isMulti) {
    const needed = ex.errorIndex.length;
    const pos = selectedErrorIndices.indexOf(i);
    if (pos !== -1) {
      // deselect
      selectedErrorIndices.splice(pos, 1);
      document.getElementById('errw-' + i).classList.remove('selected');
    } else if (selectedErrorIndices.length < needed) {
      selectedErrorIndices.push(i);
      document.getElementById('errw-' + i).classList.add('selected');
    }
    if (selectedErrorIndices.length > 0) {
      document.getElementById('correctionArea').style.display = 'block';
      // Update labels to show which selected word each input corresponds to
      const words = ex.sentence.split(' ');
      selectedErrorIndices.forEach((wordIdx, k) => {
        const label = document.getElementById('corr-label-' + k);
        if (label) label.textContent = `"${words[wordIdx]}" → replace with:`;
      });
      // Reset unselected labels to default
      for (let k = selectedErrorIndices.length; k < needed; k++) {
        const label = document.getElementById('corr-label-' + k);
        if (label) label.textContent = `Word ${k+1} — replace with:`;
      }
      // Focus first empty input
      for (let k = 0; k < needed; k++) {
        const inp = document.getElementById('correctionInput-' + k);
        if (inp && inp.value === '') { inp.focus(); break; }
      }
    } else {
      document.getElementById('correctionArea').style.display = 'none';
    }
  } else {
    document.querySelectorAll('.error-word').forEach(el => el.classList.remove('selected'));
    document.getElementById('errw-' + i).classList.add('selected');
    selectedErrorIndex = i;
    const correctionArea = document.getElementById('correctionArea');
    correctionArea.style.display = 'flex';
    document.getElementById('correctionInput').focus();
  }
}

// ============================================================
// LOGIC: CHECK ANSWER
// ============================================================
function checkAnswer() {
  const topic = EXERCISE_DB[state.currentTopic];
  const ex = topic.exercises[state.currentIndex];
  let isCorrect = false;

  if (ex.type === 'gap') {
    const inputs = document.querySelectorAll('.gap-input');
    const answers = ex.answer.split(' ... ');
    let allCorrect = true;
    
    if (inputs.length === 1) {
      const val = inputs[0].value.trim().toLowerCase();
      const correct = ex.answer.toLowerCase();
      const alts = (ex.alt || []).map(a => a.toLowerCase());
      if (val === correct || alts.includes(val)) {
        inputs[0].classList.add('correct');
      } else {
        inputs[0].classList.add('wrong');
        allCorrect = false;
      }
    } else {
      inputs.forEach((inp, i) => {
        const val = inp.value.trim().toLowerCase();
        if (val === (answers[i] || '').trim().toLowerCase()) {
          inp.classList.add('correct');
        } else {
          inp.classList.add('wrong');
          allCorrect = false;
        }
      });
    }
    isCorrect = allCorrect;
  }

  else if (ex.type === 'mc') {
    if (selectedMC === null) return;
    isCorrect = selectedMC === ex.correct;
    if (isCorrect) {
      document.getElementById('mc-' + selectedMC).classList.add('correct-answer');
    } else {
      document.getElementById('mc-' + selectedMC).classList.add('wrong-answer');
      document.getElementById('mc-' + ex.correct).classList.add('correct-answer');
    }
  }

  else if (ex.type === 'drag') {
    const zones = document.querySelectorAll('.drop-zone');
    let allCorrect = true;
    zones.forEach(zone => {
      const blank = zone.dataset.blank;
      const expected = (ex.blanks[blank] || '').toLowerCase();
      const actual = (zone.textContent || '').trim().toLowerCase();
      if (actual === expected && actual !== '') {
        zone.classList.add('correct');
      } else {
        zone.classList.add('wrong');
        allCorrect = false;
      }
    });
    isCorrect = allCorrect;
  }

  else if (ex.type === 'error') {
    const isMulti = Array.isArray(ex.errorIndex);
    
    if (isMulti) {
      if (selectedErrorIndices.length < ex.errorIndex.length) return;
      const deletionAnswers = ['-', '', 'delete', 'remove'];
      
      // Check that the set of selected word indices matches the expected set
      const sortedSelected = [...selectedErrorIndices].sort((a,b) => a-b);
      const sortedExpected = [...ex.errorIndex].sort((a,b) => a-b);
      const indicesMatch = sortedSelected.length === sortedExpected.length &&
        sortedSelected.every((v,k) => v === sortedExpected[k]);
      
      let correctionsMatch = true;
      if (indicesMatch) {
        // For each expected error word, find which input slot the student used
        // (inputs are ordered by selection order; match each expected index to its slot)
        ex.errorIndex.forEach((expectedIdx, k) => {
          const slot = selectedErrorIndices.indexOf(expectedIdx);
          const inp = document.getElementById('correctionInput-' + slot);
          const corrVal = inp ? inp.value.trim().toLowerCase() : '';
          const expected = (ex.correction[k] || '').toLowerCase();
          const isDeletion = expected === '-';
          if (isDeletion ? !deletionAnswers.includes(corrVal) : corrVal !== expected) {
            correctionsMatch = false;
          }
        });
      }
      
      isCorrect = indicesMatch && correctionsMatch;
      
      if (isCorrect) {
        ex.errorIndex.forEach(idx => {
          document.getElementById('errw-' + idx).classList.remove('selected');
          document.getElementById('errw-' + idx).classList.add('correct-word');
        });
      } else {
        selectedErrorIndices.forEach(idx => {
          document.getElementById('errw-' + idx).classList.remove('selected');
          document.getElementById('errw-' + idx).classList.add('wrong-word');
        });
        ex.errorIndex.forEach(idx => {
          document.getElementById('errw-' + idx).classList.add('correct-word');
        });
      }
    } else {
      if (selectedErrorIndex === null) return;
      const correctionVal = document.getElementById('correctionInput').value.trim().toLowerCase();
      const correctIndex = ex.errorIndex;
      const correctWord = ex.correction.toLowerCase();
      
      const deletionAnswers = ['-', '', 'delete', 'remove'];
      const correctionMatches = correctWord === '-'
        ? deletionAnswers.includes(correctionVal)
        : correctionVal === correctWord;
      if (selectedErrorIndex === correctIndex && correctionMatches) {
        document.getElementById('errw-' + selectedErrorIndex).classList.add('correct-word');
        isCorrect = true;
      } else {
        if (selectedErrorIndex !== correctIndex) {
          document.getElementById('errw-' + selectedErrorIndex).classList.remove('selected');
          document.getElementById('errw-' + selectedErrorIndex).classList.add('wrong-word');
        }
        document.getElementById('errw-' + correctIndex).classList.add('correct-word');
        isCorrect = false;
      }
    }
  }

  // Feedback
  const feedbackEl = document.getElementById('feedback');
  if (isCorrect) {
    state.score++;
    feedbackEl.innerHTML = `<div class="feedback correct">✓ Correct!${ex.hint ? `<div class="explanation">${ex.hint}</div>` : ''}</div>`;
  } else {
    let correctText = '';
    if (ex.type === 'gap') {
      correctText = ex.answer;
      if (ex.alt && ex.alt.length) correctText += ` (also accepted: ${ex.alt.join(', ')})`;
    }
    else if (ex.type === 'mc') correctText = ex.options[ex.correct];
    else if (ex.type === 'error') {
      const words = ex.sentence.split(' ');
      if (Array.isArray(ex.errorIndex)) {
        const parts = ex.errorIndex.map((idx, k) => {
          const w = words[idx];
          const c = ex.correction[k];
          return c === '-' ? `Remove "${w}"` : `Change "${w}" → "${c}"`;
        });
        correctText = parts.join(' and ');
      } else {
        const wrongWord = words[ex.errorIndex];
        correctText = ex.correction === '-'
          ? `Remove the word "${wrongWord}"`
          : `Change "${wrongWord}" to "${ex.correction}"`;
      }
    }
    else if (ex.type === 'drag') correctText = Object.values(ex.blanks).join(', ');

    feedbackEl.innerHTML = `<div class="feedback wrong">
      ✗ Not quite. Correct answer: <strong>${correctText}</strong>
      ${ex.hint ? `<div class="explanation">${ex.hint}</div>` : ''}
    </div>`;
  }

  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-flex';
  document.getElementById('nextBtn').focus();
}

function nextExercise() {
  state.currentIndex++;
  selectedMC = null;
  selectedErrorIndex = null;
  selectedErrorIndices = [];

  if (!state.progress[state.currentTopic]) state.progress[state.currentTopic] = { completed: 0 };
  state.progress[state.currentTopic].completed = Math.max(
    state.progress[state.currentTopic].completed,
    state.currentIndex
  );
  saveProgress();

  render();
  window.scrollTo(0, 0);
}

function renderResults() {
  const topic = EXERCISE_DB[state.currentTopic];
  const pct = Math.round((state.score / state.total) * 100);
  let message = pct >= 80 ? 'Excellent work!' : pct >= 60 ? 'Good effort! Keep practising.' : 'Keep going — practice makes perfect!';

  app.innerHTML = `
    <div class="exercise-header">
      <button class="back-btn" onclick="goHome()">← Back to topics</button>
    </div>
    <div class="results-card">
      <h3>${topic.title} — Complete!</h3>
      <div class="results-score">${pct}%</div>
      <div class="results-detail">${state.score} of ${state.total} correct · ${message}</div>
      <div class="exercise-actions" style="justify-content:center">
        <button class="btn btn-primary" onclick="startTopic('${state.currentTopic}')">Try again</button>
        <button class="btn btn-outline" onclick="goHome()">All topics</button>
      </div>
    </div>
  `;
}

function goHome() {
  state.view = 'home';
  state.currentTopic = null;
  render();
  window.scrollTo(0, 0);
}

// ---- APP START ----
render();
</script>
</body>
</html>
