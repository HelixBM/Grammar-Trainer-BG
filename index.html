<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Grammar Trainer — Abitur Revision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3;
  --bg-card: #ffffff;
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --accent: #2563eb;
  --accent-light: #dbeafe;
  --correct: #16a34a;
  --correct-light: #dcfce7;
  --wrong: #dc2626;
  --wrong-light: #fee2e2;
  --border: #e5e5e5;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* --- Header --- */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header h1 span { color: var(--accent); }
.header-stats {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* --- Layout --- */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* --- Topic Grid (Home) --- */
.home-intro {
  margin-bottom: 2rem;
}
.home-intro h2 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.03em;
}
.home-intro p {
  color: var(--text-muted);
  font-size: 0.95rem;
}
.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.75rem;
}
.topic-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  position: relative;
}
.topic-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
}
.topic-card h3 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
}
.topic-card .topic-count {
  font-size: 0.8rem;
  color: var(--text-muted);
}
.topic-card .topic-progress {
  margin-top: 0.75rem;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.topic-card .topic-progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.topic-group-label {
  grid-column: 1 / -1;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 1rem 0 0.25rem;
  border-top: 1px solid var(--border);
}
.topic-group-label:first-child { border-top: none; padding-top: 0; }

/* --- Exercise View --- */
.exercise-header {
  margin-bottom: 1.5rem;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.85rem;
  color: var(--text-muted);
  text-decoration: none;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
  margin-bottom: 1rem;
  padding: 0;
}
.back-btn:hover { color: var(--text); }
.exercise-header h2 {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.exercise-header .exercise-sub {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}

.progress-bar-container {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}

/* --- Exercise Card --- */
.exercise-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}
.exercise-instruction {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--accent);
  margin-bottom: 0.75rem;
}
.exercise-sentence {
  font-size: 1.05rem;
  line-height: 1.8;
  margin-bottom: 1rem;
}

/* Gap-fill */
.gap-input {
  display: inline-block;
  border: none;
  border-bottom: 2px solid var(--border);
  background: transparent;
  font-family: var(--mono);
  font-size: 0.95rem;
  padding: 0.15rem 0.25rem;
  width: auto;
  min-width: 100px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.gap-input:focus { border-bottom-color: var(--accent); }
.gap-input.correct { border-bottom-color: var(--correct); color: var(--correct); background: var(--correct-light); }
.gap-input.wrong { border-bottom-color: var(--wrong); color: var(--wrong); background: var(--wrong-light); }

/* Multiple choice */
.mc-options {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.mc-option {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.15s;
  background: var(--bg-card);
}
.mc-option:hover { border-color: var(--accent); background: var(--accent-light); }
.mc-option.selected { border-color: var(--accent); background: var(--accent-light); }
.mc-option.correct-answer { border-color: var(--correct); background: var(--correct-light); }
.mc-option.wrong-answer { border-color: var(--wrong); background: var(--wrong-light); }
.mc-option .mc-letter {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 600;
  flex-shrink: 0;
}
.mc-option.selected .mc-letter { border-color: var(--accent); background: var(--accent); color: white; }
.mc-option.correct-answer .mc-letter { border-color: var(--correct); background: var(--correct); color: white; }
.mc-option.wrong-answer .mc-letter { border-color: var(--wrong); background: var(--wrong); color: white; }

/* Drag & Drop */
.drag-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding: 1rem;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 1rem;
  min-height: 48px;
}
.drag-item {
  display: inline-flex;
  align-items: center;
  padding: 0.4rem 0.75rem;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 0.9rem;
  font-family: var(--mono);
  cursor: grab;
  user-select: none;
  transition: all 0.15s;
}
.drag-item:active { cursor: grabbing; opacity: 0.7; }
.drag-item.placed { opacity: 0.4; pointer-events: none; }
.drag-item.correct { border-color: var(--correct); background: var(--correct-light); }
.drag-item.wrong { border-color: var(--wrong); background: var(--wrong-light); }

.drop-zone {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 100px;
  min-height: 34px;
  border: 2px dashed var(--border);
  border-radius: 6px;
  padding: 0.2rem 0.5rem;
  font-family: var(--mono);
  font-size: 0.9rem;
  vertical-align: middle;
  transition: all 0.15s;
  cursor: pointer;
}
.drop-zone.over { border-color: var(--accent); background: var(--accent-light); }
.drop-zone.filled { border-style: solid; border-color: var(--accent); background: var(--accent-light); }
.drop-zone.correct { border-color: var(--correct); background: var(--correct-light); border-style: solid; }
.drop-zone.wrong { border-color: var(--wrong); background: var(--wrong-light); border-style: solid; }

/* Error correction */
.error-sentence {
  font-size: 1.05rem;
  line-height: 2;
  margin-bottom: 0.75rem;
}
.error-word {
  display: inline-block;
  padding: 0.1rem 0.35rem;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  border-bottom: 2px solid transparent;
}
.error-word:hover { background: var(--accent-light); }
.error-word.selected {
  background: var(--accent-light);
  border-bottom-color: var(--accent);
}
.error-correction-input {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.5rem;
}
.error-correction-input input {
  flex: 1;
  padding: 0.5rem 0.75rem;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 0.9rem;
  outline: none;
}
.error-correction-input input:focus { border-color: var(--accent); }
.error-word.correct-word { background: var(--correct-light); border-bottom-color: var(--correct); }
.error-word.wrong-word { background: var(--wrong-light); border-bottom-color: var(--wrong); text-decoration: line-through; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.6rem 1.25rem;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: #1d4ed8; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

.exercise-actions {
  display: flex;
  gap: 0.75rem;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}

/* Feedback */
.feedback {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
}
.feedback.correct { background: var(--correct-light); color: var(--correct); }
.feedback.wrong { background: var(--wrong-light); color: var(--wrong); }
.feedback .explanation {
  font-weight: 400;
  margin-top: 0.25rem;
  color: var(--text);
  font-size: 0.85rem;
}

/* Results */
.results-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  text-align: center;
  box-shadow: var(--shadow);
}
.results-card h3 {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.results-score {
  font-size: 3rem;
  font-weight: 700;
  color: var(--accent);
  margin: 1rem 0;
}
.results-detail {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
}

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 1rem; }
  .topic-grid { grid-template-columns: 1fr; }
  .exercise-card { padding: 1.25rem; }
  .header-inner { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
}

/* Print hidden */
@media print { .header, .exercise-actions, .back-btn { display: none; } }

/* Touch-friendly drag for mobile */
.drag-item { touch-action: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><span>▸</span> English Grammar Trainer</h1>
    <div class="header-stats" id="headerStats"></div>
  </div>
</div>

<div class="container" id="app"></div>

<script>
// ============================================================
// EXERCISE DATA
// ============================================================
const EXERCISES = {

// ---- TENSES ----

"simple-present": {
  title: "Simple Present",
  group: "Tenses",
  exercises: [
    { type: "gap", instruction: "Fill in the correct Simple Present form.", sentence: "She ___ (go) to school every day.", answer: "goes", hint: "Third person singular: add -es after 'go'." },
    { type: "gap", instruction: "Fill in the correct Simple Present form.", sentence: "They ___ (not/like) spicy food.", answer: "do not like", alt: ["don't like"], hint: "Negation with 'do not' + base form." },
    { type: "gap", instruction: "Fill in the correct Simple Present form.", sentence: "Water ___ (boil) at 100 degrees Celsius.", answer: "boils", hint: "General truths use Simple Present." },
    { type: "gap", instruction: "Fill in the correct Simple Present form.", sentence: "___ your brother ___ (work) in an office?", answer: "Does ... work", alt: ["Does...work"], hint: "Questions: Does + subject + base form." },
    { type: "mc", instruction: "Choose the correct form.", sentence: "My parents ___ in a small village.", options: ["lives", "live", "are living", "living"], correct: 1, hint: "Plural subject → no -s ending." },
    { type: "mc", instruction: "Choose the correct form.", sentence: "The train ___ at 9:15 every morning.", options: ["is leaving", "leave", "leaves", "will leave"], correct: 2, hint: "Timetables and schedules use Simple Present." },
    { type: "error", instruction: "Find and correct the error.", sentence: "He don't know the answer to the question.", errorIndex: 1, correction: "doesn't", hint: "Third person singular needs 'doesn't', not 'don't'." },
    { type: "error", instruction: "Find and correct the error.", sentence: "She always drink coffee in the morning.", errorIndex: 2, correction: "drinks", hint: "Third person singular: add -s." },
    { type: "drag", instruction: "Drag the correct verb forms into the gaps.", sentence: "She _1_ English and he _2_ French. They _3_ each other very well.", blanks: { "_1_": "speaks", "_2_": "speaks", "_3_": "understand" }, bank: ["speaks", "speaks", "understand", "understands", "speak"] },
  ]
},

"present-progressive": {
  title: "Present Progressive",
  group: "Tenses",
  exercises: [
    { type: "gap", instruction: "Fill in the Present Progressive.", sentence: "Look! The children ___ (play) in the garden.", answer: "are playing", hint: "are + verb-ing." },
    { type: "gap", instruction: "Fill in the Present Progressive.", sentence: "I ___ (read) a very interesting book at the moment.", answer: "am reading", hint: "I + am + verb-ing." },
    { type: "gap", instruction: "Fill in the Present Progressive.", sentence: "She ___ (not/listen) to me right now.", answer: "is not listening", alt: ["isn't listening"], hint: "is not + verb-ing." },
    { type: "mc", instruction: "Choose the correct form.", sentence: "Why ___ you ___ at me like that?", options: ["do ... look", "are ... looking", "is ... looking", "does ... look"], correct: 1, hint: "An action happening right now → Present Progressive." },
    { type: "mc", instruction: "Simple Present or Present Progressive?", sentence: "I ___ sushi. It's my favourite food.", options: ["am liking", "like", "am like", "likes"], correct: 1, hint: "'Like' is a stative verb — not normally used in progressive." },
    { type: "error", instruction: "Find and correct the error.", sentence: "They are planing a surprise party for her.", errorIndex: 2, correction: "planning", hint: "Double the consonant: plan → planning." },
    { type: "error", instruction: "Find and correct the error.", sentence: "He is wanting a new car.", errorIndex: 1, correction: "wants", hint: "'Want' is a stative verb — use Simple Present." },
    { type: "drag", instruction: "Drag forms to complete the sentences.", sentence: "Right now, I _1_ TV while my sister _2_ dinner. We _3_ for our parents.", blanks: { "_1_": "am watching", "_2_": "is cooking", "_3_": "are waiting" }, bank: ["am watching", "is cooking", "are waiting", "watches", "cooks", "wait"] },
  ]
},

"simple-past": {
  title: "Simple Past",
  group: "Tenses",
  exercises: [
    { type: "gap", instruction: "Fill in the Simple Past.", sentence: "She ___ (visit) London last summer.", answer: "visited", hint: "Regular verb: add -ed." },
    { type: "gap", instruction: "Fill in the Simple Past.", sentence: "They ___ (not/see) the accident.", answer: "did not see", alt: ["didn't see"], hint: "Negation: did not + base form." },
    { type: "gap", instruction: "Fill in the Simple Past.", sentence: "He ___ (take) the bus to work yesterday.", answer: "took", hint: "Irregular verb: take → took." },
    { type: "gap", instruction: "Fill in the Simple Past.", sentence: "We ___ (buy) a new car last month.", answer: "bought", hint: "Irregular verb: buy → bought." },
    { type: "mc", instruction: "Choose the correct past form.", sentence: "The concert ___ at 8 p.m. and ___ at 11 p.m.", options: ["started / ended", "has started / has ended", "was starting / was ending", "start / end"], correct: 0, hint: "Completed actions with a past time reference." },
    { type: "mc", instruction: "Choose the correct form.", sentence: "___ you ___ to the party last Friday?", options: ["Did ... go", "Have ... gone", "Were ... going", "Do ... go"], correct: 0, hint: "'Last Friday' signals Simple Past." },
    { type: "error", instruction: "Find and correct the error.", sentence: "She writed a letter to her friend.", errorIndex: 1, correction: "wrote", hint: "Irregular verb: write → wrote." },
    { type: "error", instruction: "Find and correct the error.", sentence: "We didn't went to the cinema.", errorIndex: 2, correction: "go", hint: "After 'didn't', use the base form." },
    { type: "drag", instruction: "Drag the correct past forms.", sentence: "Yesterday, I _1_ up early, _2_ breakfast and _3_ to work.", blanks: { "_1_": "got", "_2_": "had", "_3_": "drove" }, bank: ["got", "had", "drove", "getted", "have", "drived"] },
  ]
},

"past-progressive": {
  title: "Past Progressive",
  group: "Tenses",
  exercises: [
    { type: "gap", instruction: "Fill in the Past Progressive.", sentence: "At 8 p.m. yesterday, I ___ (watch) a film.", answer: "was watching", hint: "was/were + verb-ing." },
    { type: "gap", instruction: "Fill in the Past Progressive.", sentence: "The students ___ (not/pay) attention during the lesson.", answer: "were not paying", alt: ["weren't paying"], hint: "Plural subject → were not + verb-ing." },
    { type: "mc", instruction: "Simple Past or Past Progressive?", sentence: "While I ___ dinner, the phone ___.", options: ["cooked / was ringing", "was cooking / rang", "was cooking / was ringing", "cooked / rang"], correct: 1, hint: "Longer action (progressive) interrupted by shorter action (simple)." },
    { type: "mc", instruction: "Choose the correct form.", sentence: "What ___ you ___ at 10 o'clock last night?", options: ["did ... do", "were ... doing", "have ... done", "are ... doing"], correct: 1, hint: "Action in progress at a specific past time." },
    { type: "error", instruction: "Find and correct the error.", sentence: "They was playing football when it started to rain.", errorIndex: 1, correction: "were", hint: "Plural subject 'they' → were." },
    { type: "drag", instruction: "Complete with Past Progressive or Simple Past.", sentence: "She _1_ a book when someone _2_ on the door. She _3_ up and _4_ the door.", blanks: { "_1_": "was reading", "_2_": "knocked", "_3_": "got", "_4_": "opened" }, bank: ["was reading", "knocked", "got", "opened", "read", "was knocking"] },
  ]
},

"present-perfect": {
  title: "Present Perfect Simple",
  group: "Tenses",
  exercises: [
    { type: "gap", instruction: "Fill in the Present Perfect.", sentence: "I ___ (already/finish) my homework.", answer: "have already finished", hint: "have/has + past participle. 'Already' goes between have and past participle." },
    { type: "gap", instruction: "Fill in the Present Perfect.", sentence: "She ___ (never/be) to Japan.", answer: "has never been", hint: "has + never + past participle." },
    { type: "gap", instruction: "Fill in the Present Perfect.", sentence: "They ___ (live) here since 2010.", answer: "have lived", hint: "'Since' signals Present Perfect." },
    { type: "mc", instruction: "Simple Past or Present Perfect?", sentence: "I ___ my keys. Can you help me find them?", options: ["lost", "have lost", "was losing", "had lost"], correct: 1, hint: "Result in the present → Present Perfect." },
    { type: "mc", instruction: "Choose the correct form.", sentence: "She ___ three cups of coffee today.", options: ["drank", "has drunk", "is drinking", "drinks"], correct: 1, hint: "'Today' (unfinished time period) → Present Perfect." },
    { type: "error", instruction: "Find and correct the error.", sentence: "He has went to the supermarket.", errorIndex: 2, correction: "gone", hint: "go → gone (past participle), not 'went'." },
    { type: "error", instruction: "Find and correct the error.", sentence: "I have seen him yesterday.", errorIndex: 4, correction: "—", hint: "Remove 'yesterday' — definite past time needs Simple Past: 'I saw him yesterday.' The word 'yesterday' is the error." },
    { type: "drag", instruction: "Drag to complete with Present Perfect.", sentence: "We _1_ here for two hours. She _2_ yet. I _3_ her three times.", blanks: { "_1_": "have waited", "_2_": "hasn't arrived", "_3_": "have called" }, bank: ["have waited", "hasn't arrived", "have called", "waited", "didn't arrive", "called"] },
  ]
},

"present-perfect-progressive": {
  title: "Present Perfect Progressive",
  group: "Tenses",
  exercises: [
    { type: "gap", instruction: "Fill in the Present Perfect Progressive.", sentence: "It ___ (rain) for three hours.", answer: "has been raining", hint: "has/have + been + verb-ing." },
    { type: "gap", instruction: "Fill in the Present Perfect Progressive.", sentence: "They ___ (work) on this project since January.", answer: "have been working", hint: "have + been + working. 'Since' emphasises duration." },
    { type: "mc", instruction: "Present Perfect Simple or Progressive?", sentence: "Your eyes are red. ___ you ___?", options: ["Did ... cry", "Have ... cried", "Have ... been crying", "Are ... crying"], correct: 2, hint: "Visible result of a recent ongoing action → Progressive." },
    { type: "mc", instruction: "Present Perfect Simple or Progressive?", sentence: "She ___ five emails so far today.", options: ["has been writing", "has written", "wrote", "is writing"], correct: 1, hint: "Completed number of items → Simple, not Progressive." },
    { type: "error", instruction: "Find and correct the error.", sentence: "He has been study all day.", errorIndex: 3, correction: "studying", hint: "been + verb-ING (studying, not study)." },
  ]
},

"past-perfect": {
  title: "Past Perfect",
  group: "Tenses",
  exercises: [
    { type: "gap", instruction: "Fill in the Past Perfect.", sentence: "When I arrived, the film ___ (already/start).", answer: "had already started", hint: "had + already + past participle." },
    { type: "gap", instruction: "Fill in the Past Perfect.", sentence: "She ___ (not/eat) anything before the meeting.", answer: "had not eaten", alt: ["hadn't eaten"], hint: "had not + past participle." },

// ============================================================
// APP STATE
// ============================================================
let state = {
  view: 'home', // home | topic | results
  currentTopic: null,
  currentIndex: 0,
  answers: {},
  score: 0,
  total: 0,
  progress: loadProgress(),
};

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('grammar-progress') || '{}'); }
  catch { return {}; }
}
function saveProgress() {
  try { localStorage.setItem('grammar-progress', JSON.stringify(state.progress)); }
  catch {}
}

// ============================================================
// RENDER ENGINE
// ============================================================
const app = document.getElementById('app');
const headerStats = document.getElementById('headerStats');

function render() {
  updateHeaderStats();
  if (state.view === 'home') renderHome();
  else if (state.view === 'topic') renderExercise();
  else if (state.view === 'results') renderResults();
}

function updateHeaderStats() {
  const total = Object.keys(EXERCISES).reduce((sum, k) => sum + EXERCISES[k].exercises.length, 0);
  const done = Object.values(state.progress).reduce((sum, p) => sum + (p.completed || 0), 0);
  headerStats.textContent = `${done} / ${total} exercises completed`;
}

// ---- HOME ----
function renderHome() {
  const groups = {};
  for (const [key, topic] of Object.entries(EXERCISES)) {
    if (!groups[topic.group]) groups[topic.group] = [];
    groups[topic.group].push({ key, ...topic });
  }

  let html = `
    <div class="home-intro">
      <h2>Abitur Grammar Revision</h2>
      <p>Choose a topic to start practising. Your progress is saved automatically.</p>
    </div>
    <div class="topic-grid">
  `;

  for (const [group, topics] of Object.entries(groups)) {
    html += `<div class="topic-group-label">${group}</div>`;
    for (const t of topics) {
      const p = state.progress[t.key] || { completed: 0 };
      const pct = Math.round((p.completed / t.exercises.length) * 100);
      html += `
        <div class="topic-card" onclick="startTopic('${t.key}')">
          <h3>${t.title}</h3>
          <div class="topic-count">${t.exercises.length} exercises · ${p.completed || 0} completed</div>
          <div class="topic-progress"><div class="topic-progress-bar" style="width:${pct}%"></div></div>
        </div>
      `;
    }
  }

  html += '</div>';
  app.innerHTML = html;
}

// ---- START TOPIC ----
function startTopic(key) {
  state.view = 'topic';
  state.currentTopic = key;
  state.currentIndex = 0;
  state.answers = {};
  state.score = 0;
  state.total = EXERCISES[key].exercises.length;
  render();
  window.scrollTo(0, 0);
}

// ---- RENDER EXERCISE ----
function renderExercise() {
  const topic = EXERCISES[state.currentTopic];
  if (state.currentIndex >= topic.exercises.length) {
    state.view = 'results';
    render();
    return;
  }

  const ex = topic.exercises[state.currentIndex];
  const pct = Math.round((state.currentIndex / topic.exercises.length) * 100);

  let html = `
    <div class="exercise-header">
      <button class="back-btn" onclick="goHome()">← Back to topics</button>
      <h2>${topic.title}</h2>
      <div class="exercise-sub">Exercise ${state.currentIndex + 1} of ${topic.exercises.length}</div>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
  `;

  html += '<div class="exercise-card">';
  html += `<div class="exercise-instruction">${ex.instruction}</div>`;

  if (ex.type === 'gap') html += renderGap(ex);
  else if (ex.type === 'mc') html += renderMC(ex);
  else if (ex.type === 'drag') html += renderDrag(ex);
  else if (ex.type === 'error') html += renderError(ex);

  html += `<div id="feedback"></div>`;
  html += `<div class="exercise-actions">
    <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">Check</button>
    <button class="btn btn-outline" id="nextBtn" onclick="nextExercise()" style="display:none">Next →</button>
  </div>`;
  html += '</div>';

  app.innerHTML = html;

  if (ex.type === 'drag') initDragDrop();
}

// ---- GAP-FILL ----
function renderGap(ex) {
  const parts = ex.sentence.split('___');
  let html = '<div class="exercise-sentence">';
  for (let i = 0; i < parts.length; i++) {
    html += parts[i];
    if (i < parts.length - 1) {
      html += `<input type="text" class="gap-input" id="gap-${i}" autocomplete="off" autocorrect="off" spellcheck="false">`;
    }
  }
  html += '</div>';
  return html;
}

// ---- MULTIPLE CHOICE ----
function renderMC(ex) {
  let html = `<div class="exercise-sentence">${ex.sentence}</div>`;
  html += '<div class="mc-options">';
  const letters = ['A', 'B', 'C', 'D'];
  ex.options.forEach((opt, i) => {
    html += `<div class="mc-option" id="mc-${i}" onclick="selectMC(${i})">
      <span class="mc-letter">${letters[i]}</span>
      <span>${opt}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

let selectedMC = null;
function selectMC(i) {
  if (document.getElementById('nextBtn').style.display !== 'none') return;
  document.querySelectorAll('.mc-option').forEach(el => el.classList.remove('selected'));
  document.getElementById('mc-' + i).classList.add('selected');
  selectedMC = i;
}

// ---- DRAG & DROP ----
function renderDrag(ex) {
  const shuffled = [...ex.bank].sort(() => Math.random() - 0.5);
  let html = '<div class="drag-bank" id="dragBank">';
  shuffled.forEach((item, i) => {
    html += `<div class="drag-item" id="drag-${i}" draggable="true" data-value="${item}">${item}</div>`;
  });
  html += '</div>';

  html += '<div class="exercise-sentence">';
  const parts = ex.sentence.split(/(_\d+_)/);
  for (const part of parts) {
    if (/^_\d+_$/.test(part)) {
      html += `<span class="drop-zone" data-blank="${part}" onclick="clearDrop(this)"></span>`;
    } else {
      html += part;
    }
  }
  html += '</div>';
  return html;
}

function initDragDrop() {
  const items = document.querySelectorAll('.drag-item');
  const zones = document.querySelectorAll('.drop-zone');

  let dragged = null;

  items.forEach(item => {
    item.addEventListener('dragstart', e => {
      dragged = item;
      e.dataTransfer.effectAllowed = 'move';
    });

    // Touch support
    item.addEventListener('touchstart', e => {
      if (item.classList.contains('placed')) return;
      dragged = item;
    });
  });

  zones.forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('over');
      if (dragged && !zone.classList.contains('filled')) {
        placeInZone(zone, dragged);
      }
    });

    // Touch: tap zone after selecting item
    zone.addEventListener('click', () => {
      if (dragged && !zone.classList.contains('filled')) {
        placeInZone(zone, dragged);
        dragged = null;
      }
    });

    // Touch: also tap items
    zone.addEventListener('touchend', e => {
      e.preventDefault();
      if (dragged && !zone.classList.contains('filled')) {
        placeInZone(zone, dragged);
        dragged = null;
      }
    });
  });

  // Tap-to-select for mobile
  items.forEach(item => {
    item.addEventListener('click', () => {
      if (item.classList.contains('placed')) return;
      items.forEach(i => i.style.outline = '');
      item.style.outline = '2px solid var(--accent)';
      dragged = item;
    });
  });
}

function placeInZone(zone, item) {
  zone.textContent = item.dataset.value;
  zone.classList.add('filled');
  zone.dataset.sourceId = item.id;
  item.classList.add('placed');
  item.style.outline = '';
}

function clearDrop(zone) {
  if (!zone.classList.contains('filled')) return;
  if (document.getElementById('nextBtn').style.display !== 'none') return;
  const srcId = zone.dataset.sourceId;
  if (srcId) {
    const src = document.getElementById(srcId);
    if (src) src.classList.remove('placed');
  }
  zone.textContent = '';
  zone.classList.remove('filled');
  zone.removeAttribute('data-source-id');
}

// ---- ERROR CORRECTION ----
function renderError(ex) {
  const words = ex.sentence.split(' ');
  let html = '<div class="error-sentence">';
  words.forEach((w, i) => {
    html += `<span class="error-word" id="errw-${i}" onclick="selectError(${i})">${w}</span> `;
  });
  html += '</div>';
  html += `<div class="error-correction-input" id="correctionArea" style="display:none">
    <span style="font-size:0.85rem;color:var(--text-muted)">Replace with:</span>
    <input type="text" id="correctionInput" placeholder="Type the correction…" autocomplete="off">
  </div>`;
  return html;
}

let selectedErrorIndex = null;
function selectError(i) {
  if (document.getElementById('nextBtn').style.display !== 'none') return;
  document.querySelectorAll('.error-word').forEach(el => el.classList.remove('selected'));
  document.getElementById('errw-' + i).classList.add('selected');
  selectedErrorIndex = i;
  document.getElementById('correctionArea').style.display = 'flex';
  document.getElementById('correctionInput').focus();
}

// ============================================================
// CHECK ANSWER
// ============================================================
function checkAnswer() {
  const topic = EXERCISES[state.currentTopic];
  const ex = topic.exercises[state.currentIndex];
  let isCorrect = false;

  if (ex.type === 'gap') {
    const inputs = document.querySelectorAll('.gap-input');
    const answers = ex.answer.split(' ... ');
    let allCorrect = true;
    if (inputs.length === 1) {
      const val = inputs[0].value.trim().toLowerCase();
      const correct = ex.answer.toLowerCase();
      const alts = (ex.alt || []).map(a => a.toLowerCase());
      if (val === correct || alts.includes(val)) {
        inputs[0].classList.add('correct');
      } else {
        inputs[0].classList.add('wrong');
        allCorrect = false;
      }
    } else {
      inputs.forEach((inp, i) => {
        const val = inp.value.trim().toLowerCase();
        if (val === answers[i]?.toLowerCase()) {
          inp.classList.add('correct');
        } else {
          inp.classList.add('wrong');
          allCorrect = false;
        }
      });
    }
    isCorrect = allCorrect;
  }

  else if (ex.type === 'mc') {
    if (selectedMC === null) return;
    isCorrect = selectedMC === ex.correct;
    if (isCorrect) {
      document.getElementById('mc-' + selectedMC).classList.add('correct-answer');
    } else {
      document.getElementById('mc-' + selectedMC).classList.add('wrong-answer');
      document.getElementById('mc-' + ex.correct).classList.add('correct-answer');
    }
  }

  else if (ex.type === 'drag') {
    const zones = document.querySelectorAll('.drop-zone');
    let allCorrect = true;
    zones.forEach(zone => {
      const blank = zone.dataset.blank;
      const expected = ex.blanks[blank]?.toLowerCase();
      const actual = (zone.textContent || '').trim().toLowerCase();
      if (actual === expected) {
        zone.classList.add('correct');
      } else {
        zone.classList.add('wrong');
        allCorrect = false;
      }
    });
    isCorrect = allCorrect;
  }

  else if (ex.type === 'error') {
    if (selectedErrorIndex === null) return;
    const correctionVal = document.getElementById('correctionInput').value.trim().toLowerCase();
    const correctIndex = ex.errorIndex;
    const correctWord = ex.correction.toLowerCase();
    if (selectedErrorIndex === correctIndex && (correctionVal === correctWord)) {
      document.getElementById('errw-' + selectedErrorIndex).classList.add('wrong-word');
      isCorrect = true;
    } else {
      if (selectedErrorIndex !== correctIndex) {
        document.getElementById('errw-' + selectedErrorIndex).classList.remove('selected');
      }
      document.getElementById('errw-' + correctIndex).classList.add('wrong-word');
      isCorrect = false;
    }
  }

  // Show feedback
  const feedbackEl = document.getElementById('feedback');
  if (isCorrect) {
    state.score++;
    feedbackEl.innerHTML = `<div class="feedback correct">✓ Correct!</div>`;
  } else {
    let correctText = '';
    if (ex.type === 'gap') correctText = ex.answer;
    else if (ex.type === 'mc') correctText = ex.options[ex.correct];
    else if (ex.type === 'error') correctText = `Word "${ex.sentence.split(' ')[ex.errorIndex]}" → "${ex.correction}"`;
    else if (ex.type === 'drag') correctText = Object.values(ex.blanks).join(', ');

    feedbackEl.innerHTML = `<div class="feedback wrong">
      ✗ Not quite. Correct answer: <strong>${correctText}</strong>
      ${ex.hint ? `<div class="explanation">${ex.hint}</div>` : ''}
    </div>`;
  }

  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

// ---- NEXT ----
function nextExercise() {
  state.currentIndex++;
  selectedMC = null;
  selectedErrorIndex = null;

  // Update progress
  if (!state.progress[state.currentTopic]) state.progress[state.currentTopic] = { completed: 0 };
  state.progress[state.currentTopic].completed = Math.max(
    state.progress[state.currentTopic].completed,
    state.currentIndex
  );
  saveProgress();

  render();
  window.scrollTo(0, 0);
}

// ---- RESULTS ----
function renderResults() {
  const topic = EXERCISES[state.currentTopic];
  const pct = Math.round((state.score / state.total) * 100);
  let message = pct >= 80 ? 'Excellent work!' : pct >= 60 ? 'Good effort! Keep practising.' : 'Keep going — practice makes perfect!';

  app.innerHTML = `
    <div class="exercise-header">
      <button class="back-btn" onclick="goHome()">← Back to topics</button>
    </div>
    <div class="results-card">
      <h3>${topic.title} — Complete!</h3>
      <div class="results-score">${pct}%</div>
      <div class="results-detail">${state.score} of ${state.total} correct · ${message}</div>
      <div class="exercise-actions" style="justify-content:center">
        <button class="btn btn-primary" onclick="startTopic('${state.currentTopic}')">Try again</button>
        <button class="btn btn-outline" onclick="goHome()">All topics</button>
      </div>
    </div>
  `;
}

function goHome() {
  state.view = 'home';
  state.currentTopic = null;
  render();
  window.scrollTo(0, 0);
}

// ---- INIT ----
render();
</script>
